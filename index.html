<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Cover Downloader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }body {
  min-height: 100vh;
  background:
    linear-gradient(to bottom, rgba(0,180,255,0.15), rgba(255,255,255,0.05)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat fixed;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  backdrop-filter: blur(2px);
  background: linear-gradient(to bottom, rgba(80,190,255,0.08), rgba(255,255,255,0.03));
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 520px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.28), rgba(255,255,255,0.12));
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 32px;
  padding: 32px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.7),
    0 25px 60px rgba(0,0,0,0.28);
  position: relative;
  overflow: hidden;
}

.glow {
  position: absolute;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(255,255,255,0.7), rgba(0,180,255,0.08));
  opacity: 0.7;
  border-radius: 50%;
  filter: blur(50px);
  top: -120px;
  right: -80px;
  pointer-events: none;
}

.spotify-icon {
  width: 68px;
  height: 68px;
  border-radius: 22px;
  background: linear-gradient(to bottom, #7dffb3, #1DB954);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin-bottom: 18px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.8),
    0 12px 30px rgba(29,185,84,0.45);
  box-shadow: 0 10px 25px rgba(29,185,84,0.35);
}

h1 {
  font-size: 30px;
  margin-bottom: 10px;
  letter-spacing: -1px;
}

p {
  color: #b5b5b5;
  margin-bottom: 24px;
  line-height: 1.6;
  font-size: 15px;
}

input {
  width: 100%;
  padding: 16px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.4);
  background: linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0.15));
  color: white;
  font-size: 15px;
  outline: none;
  margin-bottom: 16px;
  box-shadow: inset 0 1px 3px rgba(255,255,255,0.3);
  transition: 0.2s ease;
}

input:focus {
  border-color: rgba(29,185,84,0.7);
  box-shadow: 0 0 0 4px rgba(29,185,84,0.12);
}

button {
  width: 100%;
  padding: 15px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 18px;
  background: linear-gradient(to bottom, #7effaf, #1DB954);
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.8),
    0 10px 25px rgba(29,185,84,0.35);
}

button:hover {
  transform: translateY(-2px);
}

.result {
  margin-top: 28px;
  display: none;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

.loader {
  display: none;
  justify-content: center;
  align-items: center;
  margin-top: 22px;
}

.spinner {
  width: 46px;
  height: 46px;
  border: 4px solid rgba(255,255,255,0.08);
  border-top: 4px solid #1DB954;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  box-shadow: 0 0 25px rgba(29,185,84,0.25);
}

@keyframes spin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.cover {
  width: 100%;
  border-radius: 24px;
  margin-bottom: 18px;
  box-shadow: 0 20px 45px rgba(0,0,0,0.45);
}

.download-btn {
  display: inline-block;
  text-decoration: none;
  background: linear-gradient(135deg, #ffffff, #dcdcdc);
  color: black;
  padding: 14px 22px;
  border-radius: 14px;
  font-weight: 700;
  transition: 0.2s ease;
  cursor: pointer;
  border: none;
  box-shadow: 0 10px 25px rgba(255,255,255,0.08);
}

.download-btn:hover {
  transform: scale(1.04);
}

.error {
  margin-top: 14px;
  color: #ff7b7b;
  font-size: 14px;
  text-align: center;
}

.footer {
  margin-top: 24px;
  color: #7a7a7a;
  font-size: 12px;
  text-align: center;
  line-height: 1.5;
}

  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="spotify-icon">♫</div>
    <h1>Spotify Cover Art</h1>
    <p>
      Pega un link de Spotify y descarga el cover art en alta calidad. Ideal para edits, wallpapers, thumbnails o simplemente porque el álbum se ve demasiado limpio.
    </p><input
  id="spotifyUrl"
  type="text"
  placeholder="https://open.spotify.com/album/..."
/>

<button onclick="getCover()">Obtener Cover</button>

<div class="error" id="error"></div>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div class="result" id="result">
  <img id="coverImage" class="cover" src="" alt="Cover Art" />
  <br />
  <button id="downloadBtn" class="download-btn">
    Descargar HD
  </button>
</div>

<div class="footer">
  Hecho para verse clean, no para hackear la NASA.
</div>

  </div>  <script>
    async function getCover() {
      const input = document.getElementById('spotifyUrl').value.trim();
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      const loader = document.getElementById('loader');
      const coverImage = document.getElementById('coverImage');
      const downloadBtn = document.getElementById('downloadBtn');

      error.textContent = '';
      result.style.display = 'none';
      loader.style.display = 'flex';

      // Solo permitir tracks
      if (input.includes('/album/')) {
        loader.style.display = 'none';
        error.textContent = 'Solo se permiten links de canciones (tracks), no álbumes.';
        return;
      }

      if (!input.includes('/track/')) {
        loader.style.display = 'none';
        error.textContent = 'Pon un link válido de una canción de Spotify.';
        return;
      }

      if (!input.includes('spotify.com')) {
        loader.style.display = 'none';
        error.textContent = 'Pon un link válido de Spotify.';
        return;
      }

      try {
        const proxy = 'https://api.allorigins.win/raw?url=';
        const targetUrl = encodeURIComponent(input);

        const response = await fetch(proxy + targetUrl);
        const html = await response.text();

        // Método principal: Spotify oEmbed
        let imageUrl = '';

        try {
          const oEmbedResponse = await fetch(
            `https://open.spotify.com/oembed?url=${encodeURIComponent(input)}`
          );

          const data = await oEmbedResponse.json();

          if (data.thumbnail_url) {
            imageUrl = data.thumbnail_url;
          }

          // Obtener nombre de la canción
          let trackName = 'spotify-track';

          if (data.title) {
            trackName = data.title
              .toLowerCase()
              .replace(/[^a-z0-9\s-]/g, '')
              .replace(/\s+/g, '-')
              .trim();
          }

          window.currentTrackName = trackName + '-coverart';
        } catch (e) {
          console.log('oEmbed falló');
        }

        // Método alternativo usando og:image
        if (!imageUrl) {
          const match = html.match(/<meta property="og:image" content="([^\"]+)"/i);

          if (match && match[1]) {
            imageUrl = match[1];
          }
        }

        if (!imageUrl) {
          loader.style.display = 'none';
          error.textContent = 'No se pudo detectar el cover art.';
          return;
        }

        // Mejorar calidad de la imagen
        imageUrl = imageUrl.replace(/ab67616d00001e02/g, 'ab67616d0000b273');

        coverImage.src = imageUrl;

        downloadBtn.onclick = async () => {
          try {
            const imgResponse = await fetch(imageUrl);
            const blob = await imgResponse.blob();
            const blobUrl = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `${window.currentTrackName || 'spotify-coverart'}.jpg`;
            document.body.appendChild(a);
            a.click();
            a.remove();

            URL.revokeObjectURL(blobUrl);
          } catch (e) {
            alert('No se pudo descargar automáticamente la imagen.');
          }
        };

        loader.style.display = 'none';
        result.style.display = 'block';
      } catch (err) {
        console.error(err);

        loader.style.display = 'none';

        // Aunque haya error, muchas veces Spotify sí entrega el cover.
        error.textContent = 'Spotify se puso dramático con CORS, pero igual debería funcionar 😭';
      }
    }
  </script></body>
</html>
